steps:
  # Build container image from Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/animalint_audio_standardizer:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/animalint_audio_standardizer:latest'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/animalint_audio_standardizer:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/animalint_audio_standardizer:latest'
